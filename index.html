<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- iOS Web App 专属标签，使其在主屏幕打开时隐藏浏览器沉浸式运行 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="每日60秒">
    <!-- 桌面图标（请替换为实际存在的正方形图片URL） -->
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/news.png">
    
    <title>每天60秒读懂世界</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; background: #f2f2f7; color: #1c1c1e; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); overflow: hidden; }
        .image-box img { width: 100%; display: block; }
        .content { padding: 20px; }
        .content h2 { margin-top: 0; font-size: 18px; color: #007aff; border-bottom: 2px solid #f0f0f5; padding-bottom: 10px; }
        .news-list { list-style: none; padding: 0; margin: 0; }
        .news-list li { padding: 10px 0; border-bottom: 1px solid #f0f0f5; font-size: 15px; line-height: 1.5; }
        .weiyu { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; font-style: italic; color: #666; font-size: 14px; }
        .loading { text-align: center; padding: 50px; color: #8e8e93; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">正在加载今日数据...</div>
    </div>

   <script>
    async function fetchData() {
        // 1. 准备多个官方公共节点，防止单点域名在国内被墙或失效
        const urls = [
            'https://60s.viki.moe/v2/60s',
            'https://60s-api.viki.moe/v2/60s'
        ];

        let response, res, success = false;

        // 2. 轮询请求，只要有一个域名成功就使用
        for (const url of urls) {
            try {
                response = await fetch(url);
                if (response.ok) {
                    res = await response.json();
                    success = true;
                    break; 
                }
            } catch (e) {
                console.error(`节点 ${url} 访问失败，正在尝试备用节点...`, e);
            }
        }

        // 3. 网络彻底断开或所有节点失效的处理
        if (!success) {
            document.getElementById('app').innerHTML = '<div class="loading">❌ 网络连接异常或接口服务暂不可用</div>';
            return;
        }

        // 4. 【核心修复】自动兼容扁平结构与包裹结构
        let finalData = null;
        if (res.code === 200 && res.data) {
            finalData = res.data; // 适配带 code/data 结构的 API
        } else if (res.news) {
            finalData = res;      // 适配直接返回内容的扁平 API
        }

        // 5. 执行渲染或报错
        if (finalData) {
            renderUI(finalData);
        } else {
            document.getElementById('app').innerHTML = `<div class="loading">❌ 数据解析失败，接口返回状态码: ${res.code || '未知'}</div>`;
        }
    }

    function renderUI(data) {
        // 6. 兼容处理：判断 news 数组里是纯文本字符串，还是包含 title 的对象
        const newsItems = data.news.map(item => {
            if (typeof item === 'object' && item !== null) {
                return `<li>${item.title || item.content || JSON.stringify(item)}</li>`;
            }
            return `<li>${item}</li>`;
        }).join('');
        
        // 7. 兼容处理微语字段名（部分历史版本为 tip，新版为 weiyu）
        const weiyuText = data.weiyu || data.tip || '暂无微语';
        const imageSrc = data.image || '';

        // 8. 动态生成 DOM 树
        document.getElementById('app').innerHTML = `
            <div class="image-box">
                ${imageSrc ? `<img src="${imageSrc}" alt="今日60秒图片">` : ''}
            </div>
            <div class="content">
                <h2>信息源列表</h2>
                <ul class="news-list">
                    ${newsItems}
                </ul>
                <div class="weiyu">
                    <strong>微语：</strong>${weiyuText}
                </div>
            </div>
        `;
    }

    // 启动执行
    fetchData();
</script>
</body>
</html>
